services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: logiroute-zookeeper
    hostname: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: logiroute-kafka
    hostname: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: logiroute-kafka-ui

    depends_on:
      - kafka

    ports:
      - "8080:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: LogiRoute
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

    restart: unless-stopped

  spark:
    image: bitnami/spark:4.0

    container_name: logiroute-spark

    ports:
      - "4040:4040"
      - "8081:8080"

    environment:
        - SPARK_MODE=master

    depends_on:
        - kafka

  postgres:
    image: postgis/postgis:16-3.4
    container_name: logiroute-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logiroute

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: logiroute-pgadmin

    depends_on:
      - postgres

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@logiroute.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    restart: unless-stopped

volumes:
  postgres-data: